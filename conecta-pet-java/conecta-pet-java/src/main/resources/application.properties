server.port=8080
server.servlet.context-path=/

spring.datasource.url=jdbc:sqlite:conecta_pet.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Gere uma chave segura: openssl rand -base64 64
jwt.secret=Q29uZWN0YVBFVF9TZWNyZXRLZXlfMjAyNV9TdXBlclNlY3VyZV9KV1RfS2V5X0Jhc2U2NA==
jwt.expiration-ms=604800000

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.dir=uploads

app.cors.allowed-origins=http://localhost:3000,http://localhost:5500,http://127.0.0.1:5500

logging.level.br.com.conectapet=DEBUG
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%highlight(%-5level)] %cyan(%logger{20}) - %msg%n
